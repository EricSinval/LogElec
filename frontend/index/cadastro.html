<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogElec - Cadastro</title>
  <link rel="stylesheet" href="../style_css/style_cadastro.css">
  <link rel="stylesheet" href="../style_css/styles_popup.css">
  <link rel="stylesheet" href="../style_css/stylescabecalho.css">
  <link rel="stylesheet" href="../style_css/styles_system.css">
  <script defer src="../script/cabecalho.js"></script>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Crie uma conta</h2>
      <p class="login-link">Já possui uma? <a href="login.html">Clique aqui</a> para fazer o login</p>

      <form id="formCadastro">
        <div class="tipo-selector" id="tipoSelector">
          <p class="tipo-label">Tipo de empresa</p>
          <div class="tipo-opcoes" role="group" aria-label="Tipo de empresa">
            <button type="button" class="tipo-btn" data-tipo="DESCARTE" aria-pressed="false">Descarte</button>
            <button type="button" class="tipo-btn" data-tipo="COLETA" aria-pressed="false">Coleta</button>
          </div>
          <div class="tipo-erro" id="tipoError"></div>
        </div>

        <label for="nomeRazao">Nome/Razão Social</label>
        <input type="text" id="nomeRazao" name="nomeRazao" placeholder="Nome/Razão Social" autocomplete="organization" required>

        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" name="cnpj" placeholder="CNPJ" inputmode="numeric" autocomplete="off" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="E-mail" autocomplete="email" inputmode="email" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Senha" autocomplete="new-password" required>

        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" name="endereco" placeholder="Endereço" autocomplete="street-address" required>

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" placeholder="Telefone" autocomplete="tel" inputmode="tel">
        <button type="submit">Cadastrar</button>
      </form>
    </div>
  </div>

  <script src="../script/popup.js"></script>
  <script src="../script/auth.js"></script>
  <script src="../script/Cadastro.js"></script>
</body>
</html>
